apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-app-kustomize-chart-pg
  namespace: demo-app-kustomize-chart
spec:
  instances: 2
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: demo_kustomize_chart_staging
  postgresql:
    parameters:
      max_connections: "100"
